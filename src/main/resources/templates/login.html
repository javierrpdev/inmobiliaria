<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inmobiliaria - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 fw-bold text-primary">Inmobiliaria</h3>

                    <form th:action="@{/login}" method="POST">

                        <div class="mb-3">
                            <label for="email" class="form-label text-muted">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" name="username" placeholder="ejemplo@correo.com" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-muted">Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            Iniciar Sesión
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
