<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Propiedades</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 bg-light vh-100 p-3 border-end">
      <h5>Menú</h5>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="#">Propiedades</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Usuarios</a></li> <li class="nav-item"><a class="nav-link" href="#">Contratos</a></li> <li class="nav-item"><a class="nav-link" href="#">Reportes</a></li>
      </ul>
    </nav>

    <main class="col-md-10 p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Propiedades</h1>
        <button id="btn-nuevo" class="btn btn-primary">Nueva Propiedad</button>
      </div>

      <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Email</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tabla-clientes">
        </tbody>
      </table>
    </main>
  </div>
</div>

<script>
  // Función para obtener y mostrar los datos
  async function cargarClientes() {
    try {
      const respuesta = await fetch('http://localhost:8080/api/clientes');
      const datos = await respuesta.json();

      const cuerpoTabla = document.getElementById('tabla-clientes');
      cuerpoTabla.innerHTML = '';

      datos.forEach(cliente => {
        const fila = `<tr>
        <td>${cliente.clienteId}</td>
        <td>${cliente.nombre}</td>
        <td>${cliente.apPaterno}</td>
        <td>${cliente.email}</td>
        <td>
          <button class="btn btn-sm btn-warning">Editar</button>
        </td>
      </tr>`;
        cuerpoTabla.innerHTML += fila;
      });
    } catch (error) {
      console.error('Error al cargar clientes:', error);
      alert('Error al cargar la lista de clientes');
    }
  }


  document.addEventListener('DOMContentLoaded', cargarClientes);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
