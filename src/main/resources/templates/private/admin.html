<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Propiedades</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 bg-light vh-100 p-3 border-end">
      <h5>Menú</h5>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link" href="#">Propiedades</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Reportes</a></li>
      </ul>
    </nav>

    <main class="col-md-10 p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Propiedades</h1>
        <button id="btn-nuevo" class="btn btn-primary">Nueva Propiedad</button>
      </div>

      <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
          <th>ID Propiedad</th>
          <th>Superficie (m²)</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tabla-propiedades">
        </tbody>
      </table>
    </main>
  </div>
</div>

<script>
  // Función para obtener y mostrar los datos
  async function cargarPropiedades() {
    try {
      const respuesta = await fetch('http://localhost:8080/api/propiedades');
      const datos = await respuesta.json();

      const cuerpoTabla = document.getElementById('tabla-propiedades');
      cuerpoTabla.innerHTML = ''; // Limpiar antes de llenar

      if (datos.length === 0) {
        cuerpoTabla.innerHTML = '<tr><td colspan="3" class="text-center">No hay propiedades registradas</td></tr>';
        return;
      }

      datos.forEach(propiedad => {
        const fila = `<tr>
          <td>${propiedad.propId}</td>
          <td>${propiedad.superficie} m²</td>
          <td>
            <button class="btn btn-sm btn-warning">Editar</button>
            <button class="btn btn-sm btn-danger">Eliminar</button>
          </td>
        </tr>`;
        cuerpoTabla.innerHTML += fila;
      });
    } catch (error) {
      console.error('Error al cargar propiedades:', error);
      alert('Hubo un error al conectar con el servidor');
    }
  }

  // Llamar a la función al cargar la página
  document.addEventListener('DOMContentLoaded', cargarPropiedades);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
